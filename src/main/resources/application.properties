spring.application.name=timesheet

# PaaS platforms (Railway) inject PORT and route to it; default 8080 locally.
server.port=${PORT:8080}

# Behind Railway's TLS-terminating proxy the app is reached over http while the browser's
# Origin is https. Honor X-Forwarded-Proto/Host so the app knows its real (https) origin;
# without this, a same-origin browser POST looks cross-origin (scheme mismatch) and Spring
# rejects it as "Invalid CORS request" (403). Only the real HTTPS deploy surfaces this.
server.forward-headers-strategy=framework

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/timesheet}
spring.datasource.username=${DATABASE_USER:timesheet}
spring.datasource.password=${DATABASE_PASSWORD:changeme}

jwt.secret=${JWT_SECRET:dev-only-placeholder-secret-not-for-prod-use-change-me}
jwt.ttl-days=${JWT_TTL_DAYS:7}

cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGINS:http://localhost:*}
